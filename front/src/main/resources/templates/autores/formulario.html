<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modoEdicao} ? 'Editar Autor' : 'Novo Autor'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<div class="container">
    <h1 class="mb-4" th:text="${modoEdicao} ? 'Editar Autor' : 'Novo Autor'"></h1>

    <div th:if="${erro}" class="alert alert-warning" th:text="${erro}"></div>

    <form th:action="${modoEdicao} ? @{/autores/{id}(id=${autorId})} : @{/autores}"
          th:object="${autorForm}" method="post">

        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" th:field="*{nome}">
            <div class="text-danger" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Nacionalidade</label>
            <input type="text" class="form-control" th:field="*{nacionalidade}">
            <div class="text-danger" th:if="${#fields.hasErrors('nacionalidade')}" th:errors="*{nacionalidade}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Ano de Nascimento</label>
            <input type="number" class="form-control" th:field="*{anoNascimento}">
            <div class="text-danger" th:if="${#fields.hasErrors('anoNascimento')}" th:errors="*{anoNascimento}"></div>
        </div>

        <button type="submit" class="btn btn-primary" th:text="${modoEdicao} ? 'Atualizar' : 'Salvar'"></button>
        <a href="/autores" class="btn btn-secondary">Cancelar</a>
    </form>

    <footer th:replace="~{layout/footer :: footer}"></footer>
</div>
</body>
</html>
