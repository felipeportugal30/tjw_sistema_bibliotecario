<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Autores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<div class="container">
    <h1 class="mb-4">Autores</h1>

    <div th:if="${mensagemSucesso}" class="alert alert-success" th:text="${mensagemSucesso}"></div>
    <div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>
    <div th:if="${erro}" class="alert alert-warning" th:text="${erro}"></div>

    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <button class="nav-link" th:classappend="${buscarId == null} ? 'active' : ''"
                    data-bs-toggle="tab" data-bs-target="#tab-lista" type="button">Lista</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" th:classappend="${buscarId != null} ? 'active' : ''"
                    data-bs-toggle="tab" data-bs-target="#tab-busca" type="button">Pesquisar por ID</button>
        </li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade" th:classappend="${buscarId == null} ? 'show active' : ''" id="tab-lista">
            <a href="/autores/novo" class="btn btn-primary mb-3">+ Novo Autor</a>

            <table class="table table-striped" th:if="${autores != null and not #lists.isEmpty(autores)}">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Nacionalidade</th>
                    <th>Ano de Nascimento</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="autor : ${autores}">
                    <td th:text="${autor.id}"></td>
                    <td th:text="${autor.nome}"></td>
                    <td th:text="${autor.nacionalidade}"></td>
                    <td th:text="${autor.anoNascimento}"></td>
                    <td>
                        <a th:href="@{/autores/{id}/editar(id=${autor.id})}" class="btn btn-sm btn-outline-secondary">Editar</a>
                        <form th:action="@{/autores/{id}/excluir(id=${autor.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Tem certeza que deseja excluir este autor?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Excluir</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
            <p th:if="${autores != null and #lists.isEmpty(autores)}">Nenhum autor cadastrado.</p>
        </div>

        <div class="tab-pane fade" th:classappend="${buscarId != null} ? 'show active' : ''" id="tab-busca">
            <form method="get" action="/autores" class="d-flex gap-2 mb-3" style="max-width: 400px;">
                <input type="number" name="buscarId" class="form-control" placeholder="ID do autor"
                       th:value="${buscarId}" min="1" required>
                <button type="submit" class="btn btn-primary">Buscar</button>
            </form>

            <div th:if="${buscarErro}" class="alert alert-warning" th:text="${buscarErro}"></div>

            <div th:if="${autorResultado}" class="card" style="max-width: 500px;">
                <div class="card-body">
                    <h5 class="card-title" th:text="${autorResultado.nome}"></h5>
                    <dl class="row mb-0">
                        <dt class="col-sm-4">ID</dt>
                        <dd class="col-sm-8" th:text="${autorResultado.id}"></dd>

                        <dt class="col-sm-4">Nacionalidade</dt>
                        <dd class="col-sm-8" th:text="${autorResultado.nacionalidade}"></dd>

                        <dt class="col-sm-4">Ano de Nascimento</dt>
                        <dd class="col-sm-8" th:text="${autorResultado.anoNascimento}"></dd>
                    </dl>
                    <a th:href="@{/autores/{id}/editar(id=${autorResultado.id})}" class="btn btn-sm btn-outline-secondary mt-3">Editar</a>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{layout/footer :: footer}"></footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
