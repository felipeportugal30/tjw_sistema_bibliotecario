<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Autores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<div class="container">
    <h1 class="mb-4">Autores</h1>

    <div th:if="${mensagemSucesso}" class="alert alert-success" th:text="${mensagemSucesso}"></div>
    <div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>
    <div th:if="${erro}" class="alert alert-warning" th:text="${erro}"></div>

    <a href="/autores/novo" class="btn btn-primary mb-3">+ Novo Autor</a>

    <table class="table table-striped" th:if="${autores != null and not #lists.isEmpty(autores)}">
        <thead>
        <tr>
            <th>Nome</th>
            <th>Nacionalidade</th>
            <th>Ano de Nascimento</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="autor : ${autores}">
            <td th:text="${autor.nome}"></td>
            <td th:text="${autor.nacionalidade}"></td>
            <td th:text="${autor.anoNascimento}"></td>
            <td>
                <a th:href="@{/autores/{id}/editar(id=${autor.id})}" class="btn btn-sm btn-outline-secondary">Editar</a>
                <form th:action="@{/autores/{id}/excluir(id=${autor.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('Tem certeza que deseja excluir este autor?');">
                    <button type="submit" class="btn btn-sm btn-outline-danger">Excluir</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <p th:if="${autores != null and #lists.isEmpty(autores)}">Nenhum autor cadastrado.</p>

    <footer th:replace="~{layout/footer :: footer}"></footer>
</div>
</body>
</html>
