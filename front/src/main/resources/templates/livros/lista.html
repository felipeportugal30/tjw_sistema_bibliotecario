<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Livros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<div class="container">
    <h1 class="mb-4">Livros</h1>

    <div th:if="${mensagemSucesso}" class="alert alert-success" th:text="${mensagemSucesso}"></div>
    <div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>
    <div th:if="${erro}" class="alert alert-warning" th:text="${erro}"></div>

    <div class="d-flex justify-content-between mb-3">
        <a href="/livros/novo" class="btn btn-primary">+ Novo Livro</a>
        <div class="btn-group">
            <a href="/livros" class="btn btn-outline-secondary"
               th:classappend="${filtroDisponivel == null} ? 'active' : ''">Todos</a>
            <a href="/livros?disponivel=true" class="btn btn-outline-secondary"
               th:classappend="${filtroDisponivel != null and filtroDisponivel} ? 'active' : ''">Disponíveis</a>
            <a href="/livros?disponivel=false" class="btn btn-outline-secondary"
               th:classappend="${filtroDisponivel != null and !filtroDisponivel} ? 'active' : ''">Indisponíveis</a>
        </div>
    </div>

    <table class="table table-striped" th:if="${livros != null and not #lists.isEmpty(livros)}">
        <thead>
        <tr>
            <th>Título</th>
            <th>Gênero</th>
            <th>Ano</th>
            <th>Disponível</th>
            <th>Autor</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="livro : ${livros}">
            <td><a th:href="@{/livros/{id}(id=${livro.id})}" th:text="${livro.titulo}"></a></td>
            <td th:text="${livro.genero}"></td>
            <td th:text="${livro.anoPublicacao}"></td>
            <td>
                <span th:class="${livro.disponivel} ? 'badge bg-success' : 'badge bg-secondary'"
                      th:text="${livro.disponivel} ? 'Sim' : 'Não'"></span>
            </td>
            <td th:text="${livro.nomeAutor}"></td>
            <td>
                <a th:href="@{/livros/{id}/editar(id=${livro.id})}" class="btn btn-sm btn-outline-secondary">Editar</a>
                <form th:action="@{/livros/{id}/excluir(id=${livro.id})}" method="post" class="d-inline livro-excluir-form"
                      th:attr="data-titulo=${livro.titulo}">
                    <button type="submit" class="btn btn-sm btn-outline-danger">Excluir</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <p th:if="${livros != null and #lists.isEmpty(livros)}">Nenhum livro cadastrado.</p>

    <footer th:replace="~{layout/footer :: footer}"></footer>
</div>
<script th:inline="none">
    document.querySelectorAll('.livro-excluir-form').forEach(function (form) {
        form.addEventListener('submit', function (event) {
            var titulo = form.getAttribute('data-titulo');
            if (!confirm('Tem certeza que deseja excluir o livro "' + titulo + '"?')) {
                event.preventDefault();
            }
        });
    });
</script>
</body>
</html>
