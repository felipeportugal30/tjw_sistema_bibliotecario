<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modoEdicao} ? 'Editar Livro' : 'Novo Livro'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<div class="container">
    <h1 class="mb-4" th:text="${modoEdicao} ? 'Editar Livro' : 'Novo Livro'"></h1>

    <div th:if="${erro}" class="alert alert-warning" th:text="${erro}"></div>

    <form th:action="${modoEdicao} ? @{/livros/{id}(id=${livroId})} : @{/livros}"
          th:object="${livroForm}" method="post">

        <div class="mb-3">
            <label class="form-label">Título</label>
            <input type="text" class="form-control" th:field="*{titulo}">
            <div class="text-danger" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Gênero</label>
            <input type="text" class="form-control" th:field="*{genero}">
            <div class="text-danger" th:if="${#fields.hasErrors('genero')}" th:errors="*{genero}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Ano de Publicação</label>
            <input type="number" class="form-control" th:field="*{anoPublicacao}">
            <div class="text-danger" th:if="${#fields.hasErrors('anoPublicacao')}" th:errors="*{anoPublicacao}"></div>
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" th:field="*{disponivel}">
            <label class="form-check-label">Disponível</label>
        </div>

        <div class="mb-3">
            <label class="form-label">Autor</label>
            <select class="form-select" th:field="*{autorId}">
                <option value="">Selecione um autor</option>
                <option th:each="autor : ${autores}" th:value="${autor.id}" th:text="${autor.nome}"></option>
            </select>
            <div class="text-danger" th:if="${#fields.hasErrors('autorId')}" th:errors="*{autorId}"></div>
        </div>

        <button type="submit" class="btn btn-primary" th:text="${modoEdicao} ? 'Atualizar' : 'Salvar'"></button>
        <a href="/livros" class="btn btn-secondary">Cancelar</a>
    </form>

    <footer th:replace="~{layout/footer :: footer}"></footer>
</div>
</body>
</html>
