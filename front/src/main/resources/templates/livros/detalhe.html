<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${livro.titulo}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<div class="container">
    <h1 class="mb-4" th:text="${livro.titulo}"></h1>

    <dl class="row">
        <dt class="col-sm-3">Gênero</dt>
        <dd class="col-sm-9" th:text="${livro.genero}"></dd>

        <dt class="col-sm-3">Ano de Publicação</dt>
        <dd class="col-sm-9" th:text="${livro.anoPublicacao}"></dd>

        <dt class="col-sm-3">Disponível</dt>
        <dd class="col-sm-9">
            <span th:class="${livro.disponivel} ? 'badge bg-success' : 'badge bg-secondary'"
                  th:text="${livro.disponivel} ? 'Sim' : 'Não'"></span>
        </dd>

        <dt class="col-sm-3">Autor</dt>
        <dd class="col-sm-9" th:text="${livro.nomeAutor}"></dd>
    </dl>

    <a th:href="@{/livros/{id}/editar(id=${livro.id})}" class="btn btn-outline-secondary">Editar</a>
    <a href="/livros" class="btn btn-secondary">Voltar para a lista</a>

    <footer th:replace="~{layout/footer :: footer}"></footer>
</div>
</body>
</html>
